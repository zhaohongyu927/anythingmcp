name: Debug Cloud Logs

on:
  workflow_dispatch:

jobs:
  debug:
    name: Dump cloud container logs
    runs-on: ubuntu-latest
    steps:
      - name: SSH and dump logs
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.CLOUD_HOST }}
          username: root
          key: ${{ secrets.CLOUD_SSH_KEY }}
          script: |
            echo "=================== docker ps -a ==================="
            docker ps -a
            echo
            echo "=================== app logs (last 300) ==================="
            docker logs --tail 300 amcp-cloud-app 2>&1 || echo "no logs for amcp-cloud-app"
            echo
            echo "=================== postgres logs (last 100) ==================="
            docker logs --tail 100 amcp-cloud-postgres 2>&1 || echo "no logs for postgres"
            echo
            echo "=================== prisma migration status ==================="
            docker exec amcp-cloud-postgres psql -U amcp -d anythingmcp -c "SELECT migration_name, applied_steps_count, finished_at, logs FROM _prisma_migrations ORDER BY started_at DESC LIMIT 10;" 2>&1 || echo "psql failed"
            echo
            echo "=================== AuthType enum values ==================="
            docker exec amcp-cloud-postgres psql -U amcp -d anythingmcp -c "SELECT enum_range(NULL::\"AuthType\");" 2>&1 || echo "enum query failed"
            echo
            echo "=================== connector_auth_cache exists? ==================="
            docker exec amcp-cloud-postgres psql -U amcp -d anythingmcp -c "SELECT to_regclass('public.connector_auth_cache');" 2>&1 || echo "table check failed"
