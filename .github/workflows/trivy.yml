name: Trivy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Daily — new CVEs land in the Trivy DB constantly.
    - cron: '0 5 * * *'

jobs:
  filesystem:
    name: Filesystem scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v6

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          # Lockfiles + Dockerfile + IaC. Skips secrets to avoid false positives
          # on test fixtures; we already enforce required-secret validation at
          # boot.
          scanners: vuln,misconfig
          skip-dirs: node_modules,.next,dist
        env:
          TRIVY_DISABLE_VEX_NOTICE: "true"

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  image:
    name: Docker image scan
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v6

      - name: Build image
        run: docker build -t anythingmcp:scan .

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: anythingmcp:scan
          format: sarif
          output: trivy-image.sarif
          ignore-unfixed: true
          severity: CRITICAL,HIGH
        env:
          TRIVY_DISABLE_VEX_NOTICE: "true"

      - name: Upload Trivy image SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image
