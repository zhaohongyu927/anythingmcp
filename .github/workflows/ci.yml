name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  backend:
    name: Backend (lint, typecheck, test, build)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: amcp
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: anythingmcp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://amcp:testpassword@localhost:5432/anythingmcp_test
      # CI-only secrets — long enough to pass our boot validation, never used
      # outside the test database.
      JWT_SECRET: ci-test-jwt-secret-at-least-32-chars-aaaaaa
      ENCRYPTION_KEY: ci-test-encryption-key-32-chars-aaaaaaaa

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: packages/backend

      - name: Run Prisma migrations
        run: npx prisma migrate deploy
        working-directory: packages/backend

      - name: Lint
        run: npm run lint
        working-directory: packages/backend

      - name: Type-check
        run: npx tsc --noEmit -p tsconfig.json
        working-directory: packages/backend

      - name: Run tests
        run: npm test
        working-directory: packages/backend

      - name: Build backend
        run: npm run build
        working-directory: packages/backend

  frontend:
    name: Frontend (lint, typecheck, build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        working-directory: packages/frontend

      - name: Type-check
        run: npx tsc --noEmit -p tsconfig.json
        working-directory: packages/frontend

      - name: Build frontend
        run: npm run build
        working-directory: packages/frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v6

      - name: Build unified image
        run: docker build -t anythingmcp:ci .
