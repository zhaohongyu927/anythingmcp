name: Build Multi-Arch Docker Image (amd64/arm64)

# 触发条件：main分支推送、手动触发构建
on:
  push:
    branches: [ main ]
  workflow_dispatch: # 支持页面手动点按钮构建

env:
  GHCR_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }} # 自动填充 用户名/anythingmcp

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取源码
      - name: Checkout source code
        uses: actions/checkout@v4

      # 2. 配置QEMU，支持arm64跨架构编译
      - name: Set up QEMU multiarch
        uses: docker/setup-qemu-action@v3

      # 3. 初始化buildx多架构构建器
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. 登录GHCR容器仓库
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      # 5. 构建并推送双架构镜像
      - name: Build & Push Image
        uses: docker/build-push-action@v6
        with:
          context: .
          # 同时构建x86_64和arm64架构
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.GHCR_REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.GHCR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          # 国内npm镜像加速编译，解决ARM下npm安装卡死
          build-args:
            NPM_REGISTRY=https://registry.npmmirror.com
