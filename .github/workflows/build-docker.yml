name: Build Multi-Arch Docker Image (amd64/arm64)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  GHCR_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # 全局强制UTF8编码
  LANG: en_US.UTF-8
  LC_ALL: en_US.UTF-8

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          # 强制检出LF换行，禁止自动CRLF转换
          line-ending: lf

      # 新增：统一清理所有文件回车符，彻底杜绝\r乱码
      - name: Fix file line endings & remove CR
        run: |
          sudo apt install -y dos2unix
          find . -type f -exec dos2unix {} \;

      # 强制构建环境UTF8，避免QEMU字符解析错乱
      - name: Set UTF-8 locale
        run: |
          sudo locale-gen en_US.UTF-8
          echo "LANG=en_US.UTF-8" >> /etc/environment
          echo "LC_ALL=en_US.UTF-8" >> /etc/environment

      - name: Set up QEMU multiarch
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build & Push Image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.GHCR_REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.GHCR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          build-args:
            NPM_REGISTRY=https://registry.npmmirror.com
          # 容器内构建阶段也强制UTF8
          env:
            LANG: en_US.UTF-8
            LC_ALL: en_US.UTF-8
